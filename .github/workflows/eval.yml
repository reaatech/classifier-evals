name: Classifier Evaluation

on:
  pull_request:
    branches: [main]

jobs:
  evaluate:
    name: Run Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run evaluation
        run: |
          mkdir -p results
          cd packages/cli
          node dist/cli.js eval \
            --dataset ../../datasets/examples/sample.csv \
            --format json \
            --output ../../results/latest.json

      - name: Check regression gates
        run: |
          cd packages/cli
          cp ../../results/latest.json ../../results/baseline.json
          node dist/cli.js gates \
            --results ../../results/latest.json \
            --gates ../../datasets/examples/gates.yaml

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/
          retention-days: 30

